<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>安克天猫旗舰店客服</title>
    <style>
        /* 样式保持不变 */
        body {
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f5f5f5;
        }

        .chat-container {
            width: 400px;
            height: 600px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .chat-header {
            background-color: #4a6fa5;
            color: white;
            padding: 15px;
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
        }

        .message {
            margin-bottom: 15px;
            max-width: 80%;
            padding: 10px 15px;
            border-radius: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            background-color: #e3f2fd;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .bot-message {
            background-color: #f1f1f1;
            margin-right: auto;
            border-bottom-left-radius: 5px;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            border-top: 1px solid #eee;
        }

        #user-input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }

        #send-button {
            background-color: #4a6fa5;
            color: white;
            border: none;
            border-radius: 20px;
            padding: 10px 15px;
            margin-left: 10px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        #send-button:hover {
            background-color: #3a5a80;
        }

        .typing-indicator {
            display: none;
            padding: 10px 15px;
            background-color: #f1f1f1;
            border-radius: 18px;
            margin-bottom: 15px;
            width: fit-content;
            border-bottom-left-radius: 5px;
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            background-color: #666;
            border-radius: 50%;
            display: inline-block;
            margin: 0 2px;
            animation: typing 1s infinite ease-in-out;
        }

        @keyframes typing {
            0%, 100% { opacity: 0.4; transform: translateY(0); }
            50% { opacity: 1; transform: translateY(-3px); }
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">安克天猫旗舰店客服（制作者：rory）</div>
        <div class="chat-messages" id="chat-messages">
            <div class="typing-indicator" id="typing-indicator">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="user-input" placeholder="输入您的问题..." autocomplete="off">
            <button id="send-button">发送</button>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const chatMessages = document.getElementById('chat-messages');
            const userInput = document.getElementById('user-input');
            const sendButton = document.getElementById('send-button');
            const typingIndicator = document.getElementById('typing-indicator');
            let isBotResponding = false;
            let buffer = [];
            let renderTimer = null;

            // 初始欢迎消息
            addBotMessage('您好！我是安克天猫旗舰店客服，请问有什么可以帮助您的吗？');

            async function sendMessage() {
                if (isBotResponding) return;
                
                const message = userInput.value.trim();
                if (message === '') return;

                addUserMessage(message);
                userInput.value = '';
                isBotResponding = true;
                typingIndicator.style.display = 'block';
                
                try {
                    const tempMessage = createTempMessage();
                    let fullResponse = '';

                    await fetchDeepSeekStream(message, (content) => {
                        // 累积内容到缓冲区
                        buffer.push(content);
                        fullResponse += content;
                        
                        // 使用定时器实现节流渲染
                        if (!renderTimer) {
                            renderTimer = setTimeout(() => {
                                tempMessage.textContent += buffer.join('');
                                buffer = [];
                                renderTimer = null;
                                keepScrollBottom();
                            }, 50); // 每50ms更新一次
                        }
                    });

                    // 确保最后的内容刷新
                    if (buffer.length > 0) {
                        tempMessage.textContent += buffer.join('');
                        buffer = [];
                    }
                    
                    // 保存完整响应到数据集
                    tempMessage.dataset.fullContent = fullResponse;
                    tempMessage.classList.add('bot-message');
                } catch (error) {
                    console.error('Error:', error);
                    addBotMessage('请求失败，请稍后再试');
                } finally {
                    isBotResponding = false;
                    typingIndicator.style.display = 'none';
                }
            }

            function createTempMessage() {
                const messageElement = document.createElement('div');
                messageElement.classList.add('message');
                messageElement.style.backgroundColor = '#f1f1f1';
                messageElement.style.borderBottomLeftRadius = '5px';
                chatMessages.insertBefore(messageElement, typingIndicator);
                return messageElement;
            }

            async function fetchDeepSeekStream(message, onStream) {
                const apiUrl = 'https://api.deepseek.com/v1/chat/completions';
                const apiKey = 'sk-85010c6ed97e442fbf8b23aa551fa57b';

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            { 
                                role: "system", 
                                content: "你是安克天猫旗舰店的客服助手。请用简洁明了的语言回答用户问题，保持自然对话风格，适当使用换行分段。回答请使用中文。" 
                            },
                            { role: "user", content: message }
                        ],
                        temperature: 0.7,
                        max_tokens: 2000,
                        stream: true
                    })
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                let partialLine = '';

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = (partialLine + chunk).split('\n');
                    partialLine = lines.pop() || '';

                    for (const line of lines) {
                        const cleanedLine = line.replace(/^data: /, '').trim();
                        if (!cleanedLine) continue;

                        try {
                            const parsed = JSON.parse(cleanedLine);
                            if (parsed.choices[0].delta.content) {
                                onStream(parsed.choices[0].delta.content);
                            }
                        } catch (err) {
                            console.warn('解析JSON失败:', err);
                        }
                    }
                }

                // 处理最后剩余的内容
                if (partialLine) {
                    const cleanedLine = partialLine.replace(/^data: /, '').trim();
                    if (cleanedLine) {
                        try {
                            const parsed = JSON.parse(cleanedLine);
                            if (parsed.choices[0].delta.content) {
                                onStream(parsed.choices[0].delta.content);
                            }
                        } catch (err) {
                            console.warn('解析最后数据失败:', err);
                        }
                    }
                }
            }

            function keepScrollBottom() {
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            function addUserMessage(message) {
                const messageElement = document.createElement('div');
                messageElement.classList.add('message', 'user-message');
                messageElement.textContent = message;
                chatMessages.insertBefore(messageElement, typingIndicator);
                keepScrollBottom();
            }

            function addBotMessage(message) {
                const messageElement = document.createElement('div');
                messageElement.classList.add('message', 'bot-message');
                messageElement.textContent = message;
                chatMessages.insertBefore(messageElement, typingIndicator);
                keepScrollBottom();
            }

            // 事件监听
            sendButton.addEventListener('click', sendMessage);
            userInput.addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    sendMessage();
                }
            });
        });
    </script>
</body>
</html>

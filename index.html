<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>陈枫然还钱！</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        /* 粒子背景 */
        #particles-js {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
        }
        
        .content {
            position: relative;
            z-index: 2;
            max-width: 100%;
            padding: 20px;
        }
        
        /* 霓虹灯标题 */
        .neon-title {
            font-size: 2.8rem;
            font-weight: 800;
            margin: 20px 0;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #fff;
            text-shadow: 
                0 0 5px #fff,
                0 0 10px #fff,
                0 0 20px #ff0080,
                0 0 30px #ff0080,
                0 0 40px #ff0080,
                0 0 55px #ff0080,
                0 0 75px #ff0080;
            animation: flicker 1.5s infinite alternate;
            line-height: 1.2;
        }
        
        /* 霓虹灯闪烁效果 */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% {
                text-shadow: 
                    0 0 5px #fff,
                    0 0 10px #fff,
                    0 0 20px #ff0080,
                    0 0 30px #ff0080,
                    0 0 40px #ff0080,
                    0 0 55px #ff0080,
                    0 0 75px #ff0080;
            }
            20%, 24%, 55% {
                text-shadow: none;
            }
        }
        
        /* 金额展示 */
        .money-display {
            font-size: 5rem;
            font-weight: 900;
            margin: 30px 0;
            color: #ffd700;
            text-shadow: 
                0 0 10px #ffd700,
                0 0 20px #ffd700,
                0 0 30px #ff8c00;
            animation: pulse 2s infinite;
            position: relative;
        }
        
        .money-display::before {
            content: "¥";
            font-size: 3rem;
            margin-right: 10px;
        }
        
        /* 金额脉冲效果 */
        @keyframes pulse {
            0% {
                transform: scale(1);
                text-shadow: 
                    0 0 10px #ffd700,
                    0 0 20px #ffd700,
                    0 0 30px #ff8c00;
            }
            50% {
                transform: scale(1.1);
                text-shadow: 
                    0 0 15px #ffd700,
                    0 0 30px #ffd700,
                    0 0 45px #ff8c00;
            }
            100% {
                transform: scale(1);
                text-shadow: 
                    0 0 10px #ffd700,
                    0 0 20px #ffd700,
                    0 0 30px #ff8c00;
            }
        }
        
        /* 还钱按钮 */
        .pay-button {
            background: linear-gradient(45deg, #ff0080, #ff8c00);
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            padding: 20px 40px;
            border: none;
            border-radius: 50px;
            margin: 40px 0;
            cursor: pointer;
            box-shadow: 
                0 0 15px #ff0080,
                0 0 30px rgba(255, 0, 128, 0.5);
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            z-index: 3;
            animation: pulse-button 2s infinite;
        }
        
        .pay-button:hover {
            transform: scale(1.05);
            box-shadow: 
                0 0 20px #ff0080,
                0 0 40px rgba(255, 0, 128, 0.7);
        }
        
        /* 按钮脉冲效果 */
        @keyframes pulse-button {
            0% {
                box-shadow: 
                    0 0 15px #ff0080,
                    0 0 30px rgba(255, 0, 128, 0.5);
            }
            50% {
                box-shadow: 
                    0 0 20px #ff0080,
                    0 0 40px rgba(255, 0, 128, 0.7);
            }
            100% {
                box-shadow: 
                    0 0 15px #ff0080,
                    0 0 30px rgba(255, 0, 128, 0.5);
            }
        }
        
        /* 飘落的钞票 */
        .falling-money {
            position: absolute;
            top: -50px;
            font-size: 2rem;
            animation: falling linear forwards;
            z-index: 0;
            user-select: none;
        }
        
        /* 钞票飘落动画 */
        @keyframes falling {
            to {
                transform: translateY(calc(100vh + 50px)) rotate(360deg);
            }
        }
        
        /* 倒计时 */
        .deadline {
            font-size: 1.2rem;
            margin-top: 20px;
            background: rgba(255, 0, 0, 0.2);
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255, 0, 0, 0.5);
            backdrop-filter: blur(5px);
        }
        
        /* 响应式调整 */
        @media (max-width: 480px) {
            .neon-title {
                font-size: 2.2rem;
            }
            .money-display {
                font-size: 4rem;
            }
            .pay-button {
                font-size: 1.5rem;
                padding: 15px 30px;
            }
        }
        
        @media (max-width: 350px) {
            .neon-title {
                font-size: 1.8rem;
            }
            .money-display {
                font-size: 3rem;
            }
        }
        
        /* 提示文本 */
        .hint {
            margin-top: 20px;
            color: rgba(255, 255, 255, 0.7);
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <!-- 粒子背景 -->
    <div id="particles-js"></div>
    
    <div class="content">
        <h1 class="neon-title">陈枫然，你这里欠我的用什么还！</h1>
        
        <div class="money-display">1000</div>
        
        <h2 class="neon-title">我找你要了</h2>
        
        <button class="pay-button">立即给钱</button>
        
        <div class="deadline">
            最后期限：2025年7月14日
        </div>
        
        <div class="hint">（页面专为iPhone优化，请及时还钱）</div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // 初始化粒子背景
        particlesJS("particles-js", {
            particles: {
                number: { value: 80, density: { enable: true, value_area: 800 } },
                color: { value: "#ffffff" },
                shape: { type: "circle" },
                opacity: { value: 0.5, random: true },
                size: { value: 3, random: true },
                line_linked: {
                    enable: true,
                    distance: 150,
                    color: "#ff0080",
                    opacity: 0.4,
                    width: 1
                },
                move: {
                    enable: true,
                    speed: 2,
                    direction: "none",
                    random: true,
                    straight: false,
                    out_mode: "out",
                    bounce: false
                }
            },
            interactivity: {
                detect_on: "canvas",
                events: {
                    onhover: { enable: true, mode: "repulse" },
                    onclick: { enable: true, mode: "push" },
                    resize: true
                }
            },
            retina_detect: true
        });
        
        // 创建飘落的钞票
        function createFallingMoney() {
            const moneySymbols = ['💰', '💵', '💴', '💶', '💷'];
            const container = document.body;
            
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const money = document.createElement('div');
                    money.classList.add('falling-money');
                    money.textContent = moneySymbols[Math.floor(Math.random() * moneySymbols.length)];
                    
                    // 随机位置
                    const leftPos = Math.random() * 100;
                    money.style.left = `${leftPos}%`;
                    
                    // 随机动画时间和延迟
                    const duration = 8 + Math.random() * 10;
                    const delay = Math.random() * 5;
                    money.style.animationDuration = `${duration}s`;
                    money.style.animationDelay = `${delay}s`;
                    
                    container.appendChild(money);
                    
                    // 动画结束后移除元素
                    setTimeout(() => {
                        money.remove();
                    }, duration * 1000);
                }, i * 500);
            }
        }
        
        // 初始创建
        createFallingMoney();
        
        // 每10秒重新创建
        setInterval(createFallingMoney, 15000);
        
        // 按钮点击效果
        document.querySelector('.pay-button').addEventListener('click', function() {
            this.textContent = '还钱中...';
            this.disabled = true;
            
            // 模拟支付过程
            setTimeout(() => {
                this.textContent = '支付成功！';
                this.style.background = 'linear-gradient(45deg, #00ff00, #00cc00)';
                this.style.boxShadow = '0 0 20px #00ff00, 0 0 40px rgba(0, 255, 0, 0.7)';
                
                // 显示成功消息
                const successMsg = document.createElement('div');
                successMsg.textContent = '陈枫然已成功还款1000元！';
                successMsg.style.color = '#00ff00';
                successMsg.style.fontSize = '1.5rem';
                successMsg.style.marginTop = '20px';
                successMsg.style.textShadow = '0 0 10px #00ff00';
                successMsg.style.animation = 'flicker 1.5s infinite alternate';
                document.querySelector('.content').appendChild(successMsg);
            }, 2000);
        });
    </script>
</body>
</html>
